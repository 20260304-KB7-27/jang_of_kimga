<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1:1 퀴즈 대결</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/script.js" defer></script>
  </head>

  <body>
    <header>
      <div id="header">
        <div class="logo-area">
          <img src="../assets/images/quiz.png" />
          <span>QUIZ BATTLE</span>
        </div>
        <span class="user-name">김家네 장씨</span>
      </div>
    </header>

    <div class="container">
      <!-- 알림 -->
      <div id="notification"></div>

      <!-- 2) 대기 화면 
      <div id="waiting-area">
        <div class="waiting-text">상대방을 기다리는 중...</div>
        <div class="spinner"></div>
        <div class="player-count">
          현재 <span id="player-count">1</span>/2명
        </div>
      </div>

      -->

      <!-- 0306 재한 -->
      <div id="waiting-area">
        <div class="waiting-card">
          <h2 class="waiting-title">상대방을 기다리는 중...</h2>
          <p class="waiting-desc">
            두 팀이 모두 입장하면 자동으로 게임이 시작됩니다.
          </p>

          <div class="spinner"></div>

          <div class="waiting-info-box">
            <div class="waiting-row">
              <span class="label">방 이름</span>
              <span class="value" id="waiting-room-name">room1</span>
            </div>
            <div class="waiting-row">
              <span class="label">참가 인원</span>
              <span class="value"><span id="player-count">1</span> / 2명</span>
            </div>
            <div class="waiting-row">
              <span class="label">내 팀명</span>
              <span class="value" id="waiting-team-name">team1</span>
            </div>
            <div class="waiting-row">
              <span class="label">상태</span>
              <span class="value status" id="waiting-status"
                >상대방 입장 대기</span
              >
            </div>
          </div>
        </div>
      </div>

      <!-- -->

      <!-- 3) 퀴즈 화면 -->
      <div id="quiz-area">
        <!-- HP 바 영역 -->
        <div class="hp-container">
          <div class="hp-player">
            <span class="hp-label">나</span>
            <div class="hp-bar-wrapper">
              <div class="hp-bar my-hp-bar" id="my-hp-bar"></div>
            </div>
            <span class="hp-text" id="my-hp-text">10 / 10</span>
          </div>
          <div class="hp-vs">VS</div>
          <div class="hp-player">
            <span class="hp-label">상대</span>
            <div class="hp-bar-wrapper">
              <div class="hp-bar opponent-hp-bar" id="opponent-hp-bar"></div>
            </div>
            <span class="hp-text" id="opponent-hp-text">10 / 10</span>
          </div>
        </div>

        <div class="quiz-header">
          <span class="quiz-progress" id="quiz-progress">Q1</span>
        </div>
        <div class="question-card">
          <div class="question-text" id="question-text"></div>
        </div>
        <div class="options" id="options"></div>
        <div class="waiting-opponent" id="waiting-opponent"></div>
      </div>

      <!-- 4) 결과 화면 -->
      <div id="result-area">
        <div class="result-title" id="result-title"></div>
        <div class="result-subtitle" id="result-subtitle"></div>
        <div class="scoreboard">
          <div class="score-card me">
            <div class="score-label">나</div>
            <div class="score-value">
              <span>❤️ <span id="my-final-hp">0</span></span>
              <span class="score-sub"
                >맞춘 수: <span id="my-score">0</span></span
              >
            </div>
          </div>
          <div class="score-card opponent">
            <div class="score-label">상대</div>
            <div class="score-value">
              <span>❤️ <span id="opponent-final-hp">0</span></span>
              <span class="score-sub"
                >맞춘 수: <span id="opponent-score">0</span></span
              >
            </div>
          </div>
        </div>
        <button class="btn btn-primary" onclick="location.reload()">
          다시 하기
        </button>
      </div>
    </div>

    <!-- <script src="/socket.io/socket.io.js"></script>
    <script></script> -->
  </body>
</html>
