<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1:1 퀴즈 대결</title>

    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/script.js" defer></script>
  </head>

  <body>
    <header>
      <div id="header">
        <div class="logo-area">
          <img src="../assets/images/quiz.png" />
          <span class="title">QUIZ BATTLE</span>
        </div>
        <span class="user-name">김家네 장씨</span>
      </div>
    </header>

    <div class="container">
      <!-- 알림 -->
      <div id="notification"></div>

      <!-- 2) 대기 화면 -->
      <div id="waiting-area">
        <div class="waiting-text">상대방을 기다리는 중...</div>
        <div class="spinner"></div>
        <div class="player-count">
          현재 <span id="player-count">1</span>/2명
        </div>
      </div>

      <!-- 3) 퀴즈 화면 -->
      <div id="quiz-area">
        <div class="battle-topbar">
          <div class="battle-logo">
            <div class="logo-circle">QUIZ</div>
            <div class="logo-text">QUIZ BATTLE</div>
          </div>

          <div class="battle-info">
            <span class="quiz-pill" id="room-name">Room #12</span>
            <span class="quiz-pill" id="quiz-progress">1 / 5</span>
            <span class="quiz-pill" id="quiz-score">내 점수: 0</span>
            <span class="quiz-pill" id="opponentScore">상대 점수: 0</span>
            <button class="top-hint-btn" id="hint-btn" type="button">
              Hint 1회
            </button>
          </div>
        </div>

        <div class="team-panel">
          <div class="team-card left">
            <div class="team-name" id="my-team-name">TEAM : 김가네 장씨 🔥</div>
            <div class="team-score" id="my-team-score">Score: 0</div>

            <div class="hp-wrap">
              <div class="hp-label">MY HP</div>
              <div class="hp-bar">
                <div class="hp-fill my" id="my-hp"></div>
              </div>
            </div>
          </div>

          <div class="vs-text">VS</div>

          <div class="team-card right">
            <div class="team-name" id="enemy-team-name">
              TEAM : 장가네 김씨 🔥
            </div>
            <div class="team-score" id="enemy-team-score">Score: 0</div>

            <div class="hp-wrap">
              <div class="hp-label">ENEMY HP</div>
              <div class="hp-bar">
                <div class="hp-fill enemy" id="enemy-hp"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="question-card">
          <div class="question-title">Question</div>
          <div class="question-text" id="question-text"></div>

          <div class="options" id="options"></div>

          <div class="control-row">
            <button class="hint-btn" id="bottom-hint-btn" type="button">
              힌트 사용
            </button>
            <button class="surrender-btn" id="surrender-btn" type="button">
              항복
            </button>
          </div>

          <div class="waiting-opponent" id="waiting-opponent"></div>
        </div>
      </div>

      <!-- 4) 결과 화면 -->
      <div id="result-area">
        <div class="result-title" id="result-title"></div>
        <div class="result-subtitle" id="result-subtitle"></div>
        <div class="scoreboard">
          <div class="score-card me">
            <div class="score-label">나</div>
            <div class="score-value" id="my-score">0</div>
          </div>
          <div class="score-card opponent">
            <div class="score-label">상대</div>
            <div class="score-value" id="opponent-score">0</div>
          </div>
        </div>
        <button class="btn btn-primary" onclick="location.reload()">
          다시 하기
        </button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      // ── 소켓 연결 ────────────────────────────
      // io() 내부에 IPv4 주소를 추후 넣으면 됨
      const socket = io();
      let currentRoom = '';
      let myScore = 0;
      let opponentScore = 0;

      let myHP = 100;
      let enemyHP = 100;
      const hpDamage = 20;
      let hintUsed = false;

      // ── 방 입장 ──────────────────────────────
      function joinRoom() {
        const input = document.getElementById('room-input');
        const roomName = input.value.trim();
        if (!roomName) return;

        currentRoom = roomName;
        socket.emit('join room', currentRoom);

        showScreen('waiting-area');
      }

      // ── 화면 전환 유틸 ───────────────────────
      function showScreen(screenId) {
        ['waiting-area', 'quiz-area', 'result-area'].forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.style.display = 'none';
        });

        const target = document.getElementById(screenId);
        if (target) target.style.display = 'block';
      }

      function showNotification(msg, duration = 2000) {
        const el = document.getElementById('notification');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => {
          el.style.display = 'none';
        }, duration);
      }

      function updateHP() {
        const myHpEl = document.getElementById('my-hp');
        const enemyHpEl = document.getElementById('enemy-hp');

        if (myHpEl) myHpEl.style.width = `${myHP}%`;
        if (enemyHpEl) enemyHpEl.style.width = `${enemyHP}%`;
      }

      function updateScoreText() {
        document.getElementById('quiz-score').textContent = `내 점수: ${myScore}`;
        document.getElementById('opponentScore').textContent =
          `상대 점수: ${opponentScore}`;
        document.getElementById('my-team-score').textContent = `Score: ${myScore}`;
        document.getElementById('enemy-team-score').textContent =
          `Score: ${opponentScore}`;
      }

      function resetBattleUI() {
        myHP = 100;
        enemyHP = 100;
        hintUsed = false;
        updateHP();
        updateScoreText();

        const hintTop = document.getElementById('hint-btn');
        const hintBottom = document.getElementById('bottom-hint-btn');
        if (hintTop) hintTop.disabled = false;
        if (hintBottom) hintBottom.disabled = false;
      }

      function useHint() {
        if (hintUsed) return;

        const wrongButtons = [...document.querySelectorAll('.option-btn')].filter(
          (btn) => !btn.classList.contains('correct') && !btn.disabled,
        );

        if (wrongButtons.length > 1) {
          wrongButtons[0].style.visibility = 'hidden';
          hintUsed = true;

          const hintTop = document.getElementById('hint-btn');
          const hintBottom = document.getElementById('bottom-hint-btn');
          if (hintTop) hintTop.disabled = true;
          if (hintBottom) hintBottom.disabled = true;
        }
      }

      function surrenderGame() {
        myHP = 0;
        updateHP();
        document.getElementById('waiting-opponent').textContent = '항복했습니다.';
        document.querySelectorAll('.option-btn').forEach((btn) => {
          btn.disabled = true;
        });
      }

      document.addEventListener('DOMContentLoaded', () => {
        const hintTop = document.getElementById('hint-btn');
        const hintBottom = document.getElementById('bottom-hint-btn');
        const surrenderBtn = document.getElementById('surrender-btn');

        if (hintTop) hintTop.addEventListener('click', useHint);
        if (hintBottom) hintBottom.addEventListener('click', useHint);
        if (surrenderBtn) surrenderBtn.addEventListener('click', surrenderGame);

        updateHP();
        updateScoreText();
      });

      // ── 소켓 이벤트: 입장 / 대기 ─────────────
      socket.on('player joined', (data) => {
        document.getElementById('player-count').textContent = data.playerCount;
      });

      socket.on('room full', () => {
        showNotification('방이 가득 찼습니다!');
        showScreen('room-selection');
      });

      // ── 소켓 이벤트: 게임 시작 ────────────────
      socket.on('game start', (data) => {
        showNotification('게임 시작!');
        myScore = 0;
        opponentScore = 0;
        resetBattleUI();
      });

      // ── 소켓 이벤트: 새 문제 ──────────────────
      socket.on('new question', (data) => {
        showScreen('quiz-area');

        // 진행 상태 업데이트
        document.getElementById('quiz-progress').textContent =
          `${data.index + 1} / ${data.total}`;
        updateScoreText();

        // 문제 표시
        document.getElementById('question-text').textContent = data.question;

        // 선택지 렌더링
        const optionsEl = document.getElementById('options');
        optionsEl.innerHTML = '';
        data.options.forEach((option, idx) => {
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.textContent = `${String.fromCharCode(65 + idx)}. ${option}`;
          btn.onclick = () => submitAnswer(idx + 1);
          optionsEl.appendChild(btn);
        });

        hintUsed = false;
        const hintTop = document.getElementById('hint-btn');
        const hintBottom = document.getElementById('bottom-hint-btn');
        if (hintTop) hintTop.disabled = false;
        if (hintBottom) hintBottom.disabled = false;

        // 대기 메시지 숨기기
        document.getElementById('waiting-opponent').textContent = '';
      });

      // ── 답변 제출 ─────────────────────────────
      function submitAnswer(answerIndex) {
        socket.emit('submit answer', {
          room: currentRoom,
          answer: answerIndex,
        });

        // 버튼 비활성화
        document.querySelectorAll('.option-btn').forEach((btn) => {
          btn.disabled = true;
        });
      }

      // ── 소켓 이벤트: 오답 알림 (본인에게만) ─────
      socket.on('answer result', (data) => {
        const buttons = document.querySelectorAll('.option-btn');

        // 내가 고른 답 오답 표시
        buttons[data.yourAnswer].classList.add('wrong');

        document.getElementById('waiting-opponent').textContent =
          '상대방 답변 대기 중...';
      });

      // ── 소켓 이벤트: 라운드 종료 ────────────────
      socket.on('round end', (data) => {
        const buttons = document.querySelectorAll('.option-btn');

        // 모든 버튼 비활성화
        buttons.forEach((btn) => {
          btn.disabled = true;
        });

        // 정답 표시
        buttons[data.correctAnswer].classList.add('correct');

        // 누가 맞췄는지 표시
        if (data.winnerId === socket.id) {
          myScore++;
          enemyHP = Math.max(0, enemyHP - hpDamage);
          updateHP();
          updateScoreText();

          document.getElementById('waiting-opponent').textContent =
            '정답! 다음 문제로 이동합니다...';
        } else if (data.winnerId) {
          opponentScore++;
          myHP = Math.max(0, myHP - hpDamage);
          updateHP();
          updateScoreText();

          document.getElementById('waiting-opponent').textContent =
            '상대방이 먼저 맞췄습니다!';
        } else {
          document.getElementById('waiting-opponent').textContent =
            '둘 다 틀렸습니다! 다음 문제로 이동합니다...';
        }
      });

      // ── 소켓 이벤트: 게임 종료 ────────────────
      socket.on('game over', (data) => {
        showScreen('result-area');

        const myId = socket.id;
        const opponentId = data.players.find((id) => id !== myId);
        const myFinalScore = data.scores[myId];
        const opponentFinalScore = data.scores[opponentId];

        document.getElementById('my-score').textContent = myFinalScore;
        document.getElementById('opponent-score').textContent =
          opponentFinalScore;

        const titleEl = document.getElementById('result-title');
        const subtitleEl = document.getElementById('result-subtitle');

        if (myFinalScore > opponentFinalScore) {
          titleEl.textContent = '승리!';
          titleEl.className = 'result-title win';
          subtitleEl.textContent = '축하합니다!';
        } else if (myFinalScore < opponentFinalScore) {
          titleEl.textContent = '패배';
          titleEl.className = 'result-title lose';
          subtitleEl.textContent = '다음엔 이길 수 있어요!';
        } else {
          titleEl.textContent = '무승부';
          titleEl.className = 'result-title draw';
          subtitleEl.textContent = '실력이 비슷하네요!';
        }
      });

      // ── 소켓 이벤트: 상대방 퇴장 ──────────────
      socket.on('opponent left', () => {
        showNotification('상대방이 나갔습니다', 3000);
        setTimeout(() => location.reload(), 2000);
      });
    </script>
  </body>
</html>
