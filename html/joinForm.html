<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!--
    외부 css 파일 참조를 위해 반드시 필요한 코드 
     -->
    <link rel="stylesheet" href="../css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap"
      rel="stylesheet"
    />
    <script src="../js/script.js" defer></script>
    <script src="/socket.io/socket.io.js"></script>
  </head>

  <body>
    <header>
      <div id="header">
        <div class="logo-area">
          <img src="../assets/images/quiz.png" />
          <span>QUIZ BATTLE</span>
        </div>
        <span class="user-name">김家네 장씨</span>
      </div>
    </header>

    <!-- 0306 -->
    <!-- 안내사항 및  -->
    <div class="container">
      <div class="inform">
        <div class="inform-header">
          <h2 class="inform-title">김家네 장씨 퀴즈 배틀</h2>
          <p class="inform-desc">
            HTML CSS, JavaScript 지식 퀴즈로 진행하는 1대1 대결형 게임
          </p>
        </div>

        <div class="rule-box">
          <h3>게임 방식</h3>
          <ul>
            <li>두 팀이 같은 문제를 보고 제한 시간 내에 선택</li>
            <li>정답 · 빠른 선택일수록 더 높은 점수(예: 스피드 보너스)</li>
            <li>누적 점수로 승패 결정</li>
          </ul>
        </div>

        <div class="rule-box">
          <h3>힌트 규칙</h3>
          <ul>
            <li>힌트 사용 시 오답 1개 제거</li>
            <li>힌트는 n회만 제공</li>
          </ul>
        </div>
      </div>

      <!-- 1) 방 입장 화면 -->
      <div class="inform" id="room-selection">
        <h1 class="title">팀 로그인</h1>
        <p class="sub-title">팀 이름</p>
        <input
          class="info-input"
          id="team-input"
          placeholder="팀 이름 입력 (예: team1)"
        />
        <p class="sub-title">방 번호</p>
        <input
          class="info-input"
          id="room-input"
          placeholder="방 이름 입력 (예: room1)"
        />
        <button class="btn-Entry btn-primary" onclick="joinRoom()">
          입장하기
        </button>
      </div>
    </div>
  </body>
</html>
