<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!--
    외부 css 파일 참조를 위해 반드시 필요한 코드 
     -->
    <link rel="stylesheet" href="../css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap"
      rel="stylesheet"
    />
    <script src="../js/script.js" defer></script>
  </head>

  <body>
    <header>
      <div id="header">
        <div class="logo-area">
          <img src="../assets/images/quiz.png" />
          <span class="title">QUIZ BATTLE</span>
        </div>
        <span class="user-name">김家네 장씨</span>
      </div>
    </header>

    <!-- 안내사항 및  -->
    <div class="container">
      <div id="inform">
        <span>김가네 장씨 퀴즈 배틀</span>
      </div>

      <!-- 1) 방 입장 화면 -->
      <div id="room-selection">
        <h1 class="title">팀 로그인</h1>
        <p class="sub-title">팀 이름</p>
        <input
          class="info-input"
          id="team-input"
          placeholder="팀 이름 입력 (예: team1)"
        />
        <p class="sub-title">방 번호</p>
        <input
          class="info-input"
          id="room-input"
          placeholder="방 이름 입력 (예: room1)"
        />
        <button class="btn btn-primary" onclick="joinRoom()">입장하기</button>
      </div>
    </div>

    <!-- <footer id="footer">footer</footer> -->
  </body>
</html>
